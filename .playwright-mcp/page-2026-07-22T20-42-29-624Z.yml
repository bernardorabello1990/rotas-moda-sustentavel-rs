          - paragraph [ref=f1e224]: Produtora cultural, artística e pesquisadora musical, graduada em Cinema pela PUCRS e mestranda em Design Estratégico pela Unisinos. Idealizou o projeto Concha, premiado pelo Edital Natura Musical, e produziu projetos como Ialodê (Lei Aldir Blanc) e IGBA AWÓ (Itaú Rumos). Vivência em metodologias ágeis e gestão de projetos e produtos digitais.
