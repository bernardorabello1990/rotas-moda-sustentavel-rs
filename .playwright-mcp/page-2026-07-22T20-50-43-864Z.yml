        - paragraph [ref=f2e85]: "O projeto realiza uma pesquisa cultural aplicada que mapeia e sistematiza as vocações territoriais da moda sustentável no Rio Grande do Sul, ouvindo quem faz: designers, artesãos, coletivos, cooperativas, carnavalescos, pequenas indústrias, pesquisadores e agentes culturais."
        - paragraph [ref=f2e86]: O resultado será um diagnóstico cultural inédito e uma base pública de dados — contribuindo para o planejamento e o fortalecimento das políticas culturais e das indústrias criativas do estado.
