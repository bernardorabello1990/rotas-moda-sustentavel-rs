          - paragraph [ref=e205]: Consultora, pesquisadora e estrategista dedicada à transição da moda para modelos circulares, justos e regenerativos. Publicitária pela UFRGS, pós-graduada em Design de Moda (Unisinos) e especialista em Sustentabilidade (UNESC), com mais de 15 anos de indústria. Sócia-fundadora da Cora Design, consultoria estratégica e Empresa B Certificada.
