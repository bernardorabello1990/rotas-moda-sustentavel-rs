          - paragraph [ref=e200]: Pesquisadora e estrategista na interface entre moda, cultura, sustentabilidade e impacto social. Administradora pela FGV, especialista em Negócios da Moda pela USP e em Diversidade e Inclusão, mestranda em Comunicação pela PUCRS. Experiência em pesquisa aplicada, projetos culturais, curadoria e articulação de parcerias no setor da moda.
